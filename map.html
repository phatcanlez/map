<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Leaflet – chỉ đường & tên đường</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      #map {
        width: 100%;
        height: 100vh;
        filter: saturate(1.15) contrast(1.03);
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // Tâm bản đồ (ví dụ Q1, HCM)
      const center = [10.77653, 106.700981];

      const map = L.map("map", {
        center,
        zoom: 16,
        zoomControl: false, // ẩn nút zoom nếu muốn
      });

      // Layer nền: Carto "Positron" – màu sáng, khá giống Google Maps
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
          maxZoom: 19,
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        },
      ).addTo(map);

      // Không thêm marker nào -> chỉ có đường + tên đường
    </script>
  </body>
</html>
