<!doctype html>

<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Leaflet - Google Maps Like</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      #map {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      const map = L.map("map", {
        center: [10.77653, 106.700981],
        zoom: 16,
        zoomControl: false,
      });

      /* đường + map */

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
        {
          maxZoom: 19,
          attribution: "© OpenStreetMap",
        },
      ).addTo(map);

      /* chỉ label */

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels/{z}/{x}/{y}{r}.png",
      ).addTo(map);
    </script>
  </body>
</html>
