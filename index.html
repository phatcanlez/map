<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Leaflet – màu tùy chỉnh</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
html,body{
  margin:0;
  padding:0;
}

#map{
  width:100%;
  height:100vh;
  background:#FFFEE0; /* màu đất */
}

/* chỉnh màu tile để đường gần #D5D7DA */
.leaflet-tile{
  filter:
    sepia(0.15)
    saturate(0.6)
    brightness(1.1)
    contrast(0.9);
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const center = [10.77653,106.700981];

const map = L.map("map",{
  center:center,
  zoom:16,
  zoomControl:false
});

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
{
  maxZoom:19,
  attribution:
  '&copy; OpenStreetMap &copy; CARTO'
}
).addTo(map);

</script>

</body>
</html>
